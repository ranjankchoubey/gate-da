<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranjan's Notebook</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/blocks.css">
  <link rel="stylesheet" href="css/modes.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar"></aside>
    <button class="sidebar-toggle" id="sidebar-toggle" onclick="App.toggleSidebar()" title="Toggle sidebar"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></button>
    
    <!-- Main -->
    <main class="main">
      <header class="toolbar" id="toolbar"></header>
      <div class="page-area" id="page-area"></div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h3 class="modal-title" id="modal-title"></h3>
      <input class="modal-input" id="modal-input" type="text" autocomplete="off">
      <div class="modal-actions">
        <button class="btn modal-cancel" id="modal-cancel">Cancel</button>
        <button class="btn modal-ok" id="modal-ok">OK</button>
      </div>
    </div>
  </div>

  <!-- Scripts (order matters) -->
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script src="js/core/store.js"></script>
  <script src="js/core/router.js"></script>
  <script src="js/core/events.js"></script>
  <script src="js/core/modal.js"></script>
  <script src="js/components/sidebar.js"></script>
  <script src="js/components/editor.js"></script>
  <script src="js/components/canvas.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
